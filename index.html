<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mitchell and Bella — Registry</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;

    html, body {

    }

    body {
      background-color: #F7F5F0;
      font-family: Georgia, serif;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding-left: 12vw;
      padding-right: 12vw;
      min-height: 100vh;
    }

    .container {
      max-width: 480px;
      width: 100%;
    }

    .prompt {
      font-size: 0.78rem;
      font-weight: 400;
      color: #1a1a1a;
      letter-spacing: 0.06em;
      margin-bottom: 1.2rem;
      line-height: 1.6;
    }

    .registry-links {
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
    }

    .registry-links a {
      font-size: 0.78rem;
      font-style: italic;
      color: #7B2020;
      text-decoration: none;
      letter-spacing: 0.06em;
    }

    .registry-links a:hover {
      color: #5C1515;
    }

<body>

<div class="container">
  <p class="prompt">Please click on the following link to access the Registry. Bella and Mitchell kindly thank you for your generosity.</p>
  <div class="registry-links">
