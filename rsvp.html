<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RSVP — Mitchell and Isabella</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="icon" type="image/png" sizes="96x96" href="favicon-96x96.png" />
  <link rel="shortcut icon" href="favicon.ico" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="manifest" href="site.webmanifest" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: #F7F5F0;
      font-family: Georgia, serif;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding-left: 12vw;
      padding-right: 12vw;
      min-height: 100vh;
    }

    .container {
      max-width: 480px;
      width: 100%;
    }

    .step {
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.5s ease, transform 0.5s ease;
      pointer-events: none;
      position: absolute;
    }

    .step.active {
      opacity: 1;
      transform: translateY(0);
      pointer-events: all;
      position: relative;
    }

    .step.exiting {
      opacity: 0;
      transform: translateY(-6px);
      pointer-events: none;
      position: absolute;
    }

    .prompt {
      font-size: 0.78rem;
      font-weight: 400;
      color: #1a1a1a;
      letter-spacing: 0.06em;
      margin-bottom: 0.6rem;
      line-height: 1.6;
    }

    .input-line {
      margin-top: 0.5rem;
      display: flex;
      align-items: baseline;
    }

    .input-field {
      position: absolute;
      opacity: 0;
      pointer-events: none;
      width: 1px;
      height: 1px;
    }

    .typed-text {
      font-family: Georgia, serif;
      font-size: 0.78rem;
      font-weight: 400;
      color: #1a1a1a;
      letter-spacing: 0.06em;
    }

    .cursor {
      display: inline-block;
      width: 1px;
      height: 0.85em;
      background: #1a1a1a;
      margin-left: 1px;
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    .event-list {
      margin-top: 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
    }

    .event-item {
      font-size: 0.78rem;
      font-weight: 400;
      color: #1a1a1a;
      letter-spacing: 0.06em;
      cursor: pointer;
      user-select: none;
      transition: color 0.25s ease;
    }

    .event-item.selected {
      color: #7B2020;
    }

    .continue-hint {
      margin-top: 1.6rem;
      font-size: 0.68rem;
      color: #999;
      letter-spacing: 0.04em;
      opacity: 0;
      transition: opacity 0.4s ease, color 0.25s ease;
      pointer-events: none;
      cursor: pointer;
      user-select: none;
    }

    .continue-hint.visible {
      opacity: 1;
      pointer-events: all;
    }

    .continue-hint:hover {
      color: #7B2020;
    }

    .confirmation {
      font-size: 0.95rem;
      font-weight: 300;
      color: #1a1a1a;
      line-height: 1.7;
      letter-spacing: 0.01em;
    }

    .steps-wrapper {
      position: relative;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="steps-wrapper">

    <!-- Step 1: Name -->
    <div class="step active" id="step-name">
      <p class="prompt">If planning to attend our celebration please type your first and last name and press enter.</p>
      <div class="input-line">
        <input class="input-field" id="input-name" type="text" autocomplete="off" spellcheck="false" autofocus />
        <span class="typed-text" id="typed-name"></span><span class="cursor"></span>
      </div>
    </div>

    <!-- Step 1b: Last name -->
    <div class="step" id="step-lastname">
      <p class="prompt">And your last name as well, please.</p>
      <div class="input-line">
        <input class="input-field" id="input-lastname" type="text" autocomplete="off" spellcheck="false" />
        <span class="typed-text" id="typed-lastname"></span><span class="cursor"></span>
      </div>
    </div>

    <!-- Step 2: Events -->
    <div class="step" id="step-events">
      <p class="prompt">Please indicate which events you were both invited and plan to attend. Click all that apply.</p>
      <div class="event-list" id="event-list"></div>
      <p class="continue-hint" id="continue-hint">Press enter to continue.</p>
    </div>

    <!-- Step 3: Confirmation -->
    <div class="step" id="step-done">
      <p class="confirmation" id="confirm-text"></p>
    </div>

  </div>
</div>

<script>
  const FORMSPREE_ENDPOINT = 'https://formspree.io/f/maqrqdng';
  const ALL_EVENTS = ['Sealing', 'Ring Ceremony', 'Reception'];

  const stepName   = document.getElementById('step-name');
  const stepLastname = document.getElementById('step-lastname');
  const inputLastname = document.getElementById('input-lastname');
  const typedLastname = document.getElementById('typed-lastname');
  const stepEvents = document.getElementById('step-events');
  const stepDone   = document.getElementById('step-done');
  const inputName  = document.getElementById('input-name');
  const typedName  = document.getElementById('typed-name');
  const confirmText= document.getElementById('confirm-text');
  const continueHint = document.getElementById('continue-hint');
  const eventList  = document.getElementById('event-list');

  let guestName = '';
  let guestRecord = null;   // { name, events: [...], guests: number|null }
  const selectedEvents = new Set();

  // ── Guest list loaded from guests.csv ──
  // CSV columns: name, events (comma-separated, quoted), guests (blank = no limit)
  let guestList = [];

  function parseCSV(text) {
    const rows = [];
    const lines = text.split(/\r?\n/).filter(l => l.trim());
    for (let i = 1; i < lines.length; i++) {   // skip header
      const line = lines[i];
      const cols = [];
      let cur = '', inQuotes = false;
      for (const ch of line) {
        if (ch === '"') { inQuotes = !inQuotes; }
        else if (ch === ',' && !inQuotes) { cols.push(cur); cur = ''; }
        else { cur += ch; }
      }
      cols.push(cur);
      const name = (cols[0] || '').trim();
      if (!name) continue;
      const events = (cols[1] || '').split(',').map(e => e.trim()).filter(Boolean);
      const guestsRaw = (cols[2] || '').trim();
      const guests = guestsRaw === '' ? null : parseInt(guestsRaw, 10);
      rows.push({ name, events, guests: Number.isFinite(guests) ? guests : null });
    }
    return rows;
  }

  fetch('guests.csv')
    .then(r => r.ok ? r.text() : '')
    .then(text => { if (text) guestList = parseCSV(text); })
    .catch(() => {});

  function normalizeName(name) {
    return name.trim().toLowerCase().replace(/[^a-z\s]/g, '').replace(/\s+/g, ' ');
  }

  function levenshtein(a, b) {
    if (a === b) return 0;
    const m = a.length, n = b.length;
    if (!m) return n;
    if (!n) return m;
    let prev = Array.from({ length: n + 1 }, (_, j) => j);
    for (let i = 1; i <= m; i++) {
      const cur = [i];
      for (let j = 1; j <= n; j++) {
        cur[j] = Math.min(
          prev[j] + 1,
          cur[j - 1] + 1,
          prev[j - 1] + (a[i - 1] === b[j - 1] ? 0 : 1)
        );
      }
      prev = cur;
    }
    return prev[n];
  }

  function findGuest(name) {
    const normalized = normalizeName(name);
    if (!normalized) return null;

    // Exact match first
    const exact = guestList.find(g => normalizeName(g.name) === normalized);
    if (exact) return exact;

    // Fuzzy match: closest name within a small typo distance
    let best = null, bestDist = Infinity;
    for (const g of guestList) {
      const dist = levenshtein(normalizeName(g.name), normalized);
      if (dist < bestDist) { bestDist = dist; best = g; }
    }
    const threshold = normalized.length <= 8 ? 1 : 2;
    return bestDist <= threshold ? best : null;
  }

  window.addEventListener('load', () => inputName.focus());

  inputName.addEventListener('input', () => {
    typedName.textContent = inputName.value;
  });

  stepName.addEventListener('click', () => inputName.focus());

  inputLastname.addEventListener('input', () => {
    typedLastname.textContent = inputLastname.value;
  });

  stepLastname.addEventListener('click', () => inputLastname.focus());

  function transition(from, to, callback) {
    from.classList.add('exiting');
    from.classList.remove('active');
    setTimeout(() => {
      from.classList.remove('exiting');
      to.classList.add('active');
      if (callback) callback();
    }, 520);
  }

  function firstName() {
    return guestName.split(' ')[0];
  }

  function guestSentence(record) {
    if (!record || record.guests === null) return '';
    return ' We kindly ask that your family limits attendance to ' + record.guests + ' guests.';
  }

  function setConfirmation(rest) {
    confirmText.innerHTML = '';
    const em = document.createElement('em');
    em.textContent = 'Thank you, ' + firstName() + '.';
    confirmText.appendChild(em);
    confirmText.appendChild(document.createTextNode(' ' + rest));
  }

  function buildEventList(events) {
    eventList.innerHTML = '';
    events.forEach(event => {
      const span = document.createElement('span');
      span.className = 'event-item';
      span.dataset.event = event;
      span.textContent = event;
      span.addEventListener('click', () => {
        if (selectedEvents.has(event)) {
          selectedEvents.delete(event);
          span.classList.remove('selected');
        } else {
          selectedEvents.add(event);
          span.classList.add('selected');
        }
        continueHint.classList.toggle('visible', selectedEvents.size > 0);
      });
      eventList.appendChild(span);
    });
  }

  async function submitRSVP(events) {
    try {
      await fetch(FORMSPREE_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify({ name: guestName, events: events.join(', ') }),
      });
    } catch (_) {}

    const existing = JSON.parse(localStorage.getItem('rsvp_responses') || '[]');
    existing.push({ name: guestName, events, timestamp: new Date().toISOString() });
    localStorage.setItem('rsvp_responses', JSON.stringify(existing));
  }

  function proceedWithName(fromStep) {
    guestRecord = findGuest(guestName);

    const multipleEvents = guestRecord && guestRecord.events.length > 1;

    if (multipleEvents) {
      buildEventList(guestRecord.events);
      transition(fromStep, stepEvents);
    } else {
      // Reception only (on the list with one event, or not on the list at all)
      const record = guestRecord || { events: ['Reception'], guests: null };
      transition(fromStep, stepDone, () => {
        setConfirmation('We are excited to see you at the reception.' + guestSentence(record));
      });
      submitRSVP(record.events);
    }
  }

  inputName.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const val = inputName.value.trim();
      if (!val) return;
      guestName = val;

      if (val.split(/\s+/).length < 2) {
        // Only a first name — ask for the last name too
        transition(stepName, stepLastname, () => inputLastname.focus());
      } else {
        proceedWithName(stepName);
      }
    }
  });

  inputLastname.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const val = inputLastname.value.trim();
      if (!val) return;
      guestName = guestName + ' ' + val;
      proceedWithName(stepLastname);
    }
  });

  function finishEvents() {
    if (!stepEvents.classList.contains('active') || selectedEvents.size === 0) return;

    const events = Array.from(selectedEvents);
    transition(stepEvents, stepDone, () => {
      setConfirmation('We are excited to celebrate with you.' + guestSentence(guestRecord));
    });
    submitRSVP(events);
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') finishEvents();
  });

  continueHint.addEventListener('click', finishEvents);

  // Touch devices have no enter key once the keyboard is dismissed
  if (window.matchMedia('(hover: none) and (pointer: coarse)').matches) {
    continueHint.textContent = 'Tap here to continue.';
  }
</script>

</body>
</html>
